app:
  name: lead-recovery
  environment: development
  port: 3000

crm:
  adapter: mock
  baseUrl: ''
  timeout: 5000

logging:
  level: info
  format: json
  correlationIdHeader: X-Correlation-ID

scheduling:
  maxCallAttempts: 3
  retryIntervalMinutes: 60

security:
  encryptionKeyEnvVar: ENCRYPTION_KEY
  jwtSecret: ''