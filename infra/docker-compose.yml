version: '3.9'
services:
  backend:
    image: node:20
    working_dir: /app
    volumes:
      - ../backend:/app
    command: sh -c "npm install && npm run start:dev"
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      APP_PORT: 3000

  frontend:
    image: python:3.12-alpine
    working_dir: /app
    volumes:
      - ../frontend:/app
    command: python -m http.server 5173 --bind 0.0.0.0
    ports:
      - '5173:5173'
    depends_on:
      - backend
